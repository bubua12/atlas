spring:
  application:
    name: atlas-gateway
  profiles:
    active: ${ATLAS_PROFILE:dev}
  config:
    import:
      - "optional:nacos:atlas-common.yaml?group=${ATLAS_NACOS_CONFIG_GROUP:ATLAS}&refreshEnabled=true"
      - "optional:nacos:atlas-logging-${ATLAS_PROFILE:dev}.yaml?group=${ATLAS_NACOS_CONFIG_GROUP:ATLAS}&refreshEnabled=true"
      - "optional:nacos:atlas-gateway.yaml?group=${ATLAS_NACOS_CONFIG_GROUP:ATLAS}&refreshEnabled=true"
  data:
  cloud:
    nacos:
      discovery:
        server-addr: ${ATLAS_NACOS_HOST:127.0.0.1:8848}
        username: ${ATLAS_NACOS_USERNAME:nacos}
        password: ${ATLAS_NACOS_PASSWORD:nacos}
      config:
        server-addr: ${ATLAS_NACOS_HOST:127.0.0.1:8848}
        username: ${ATLAS_NACOS_USERNAME:nacos}
        password: ${ATLAS_NACOS_PASSWORD:nacos}
        namespace: ${ATLAS_NACOS_CONFIG_NAMESPACE:}
        group: ${ATLAS_NACOS_CONFIG_GROUP:ATLAS}
