server:
  port: 8080
spring:
  application:
    name: atlas-gateway
  data:
    redis:
      host: ${ATLAS_REDIS_HOST:127.0.0.1}
      port: ${ATLAS_REDIS_PORT:6379}
      password: ${ATLAS_REDIS_PASSWORD:bubua12}
  cloud:
    nacos:
      discovery:
        server-addr: ${ATLAS_NACOS_HOST:127.0.0.1}
        username: ${ATLAS_NACOS_USERNAME:nacos}
        password: ${ATLAS_NACOS_PASSWORD:nacos}
    gateway:
      routes:
        - id: atlas-auth
          uri: lb://atlas-auth
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
        - id: atlas-system
          uri: lb://atlas-system
          predicates:
            - Path=/system/**
          filters:
            - StripPrefix=1
        - id: atlas-infra
          uri: lb://atlas-infra
          predicates:
            - Path=/infra/**
          filters:
            - StripPrefix=1
        - id: atlas-monitor
          uri: lb://atlas-monitor
          predicates:
            - Path=/monitor/**
          filters:
            - StripPrefix=1
atlas:
  security:
    gateway:
      secret: ${ATLAS_GATEWAY_SIGNATURE_SECRET:atlas-gateway-signature-secret-change-me}
      allowed-skew-seconds: 300
      nonce-ttl-seconds: 300
