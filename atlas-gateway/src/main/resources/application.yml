server:
  port: 8080
spring:
  application:
    name: atlas-gateway
  data:
    redis:
      host: ${ATLAS_REDIS_HOST:127.0.0.1}
      port: ${ATLAS_REDIS_PORT:6379}
      password: ${ATLAS_REDIS_PASSWORD:bubua12}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20      # 最大连接数
          max-idle: 10        # 最大空闲连接
          min-idle: 5         # 最小空闲连接
          max-wait: 2000ms    # 最大等待时间
        shutdown-timeout: 100ms
  cloud:
    nacos:
      discovery:
        server-addr: ${ATLAS_NACOS_HOST:127.0.0.1}
        username: ${ATLAS_NACOS_USERNAME:nacos}
        password: ${ATLAS_NACOS_PASSWORD:nacos}
    gateway:
      routes:
        - id: atlas-auth
          uri: lb://atlas-auth
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
        - id: atlas-system
          uri: lb://atlas-system
          predicates:
            - Path=/system/**
          filters:
            - StripPrefix=1
        - id: atlas-infra
          uri: lb://atlas-infra
          predicates:
            - Path=/infra/**
          filters:
            - StripPrefix=1
        - id: atlas-monitor
          uri: lb://atlas-monitor
          predicates:
            - Path=/monitor/**
          filters:
            - StripPrefix=1

# Atlas 自定义配置
atlas:
  jwt:
    secret: ${ATLAS_JWT_SECRET:your-256-bit-secret-key-change-in-production}
    expiration: ${ATLAS_JWT_EXPIRATION:7200}
  gateway:
    secret: ${ATLAS_GATEWAY_SECRET:your-gateway-secret-key-change-in-production}
