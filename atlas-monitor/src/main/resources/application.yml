server:
  port: 9400
spring:
  application:
    name: atlas-monitor
  cloud:
    nacos:
      discovery:
        server-addr: ${ATLAS_NACOS_HOST:127.0.0.1}
        username: ${ATLAS_NACOS_USERNAME:nacos}
        password: ${ATLAS_NACOS_PASSWORD:nacos}
  data:
    redis:
      host: ${ATLAS_REDIS_HOST:127.0.0.1}
      port: ${ATLAS_REDIS_PORT:6379}
      password: ${ATLAS_REDIS_PASSWORD:bubua12}
  boot:
    admin:
      context-path: /admin
atlas:
  security:
    gateway:
      secret: ${ATLAS_GATEWAY_SIGNATURE_SECRET:atlas-gateway-signature-secret-change-me}
      allowed-skew-seconds: 300
      nonce-ttl-seconds: 300
