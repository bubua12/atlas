bubua12:
  trace:
    starter:
      enabled: true
      feign-metrics: true
      logging-mdc: true
      redis-tracing: true
      redisson-tracing: true
      datasource-tracing: true
      mongodb-tracing: true
      kafka-tracing: true
      rabbitmq-tracing: true
      logging-pattern-level: "traceId=%mdc{traceId} spanId=%mdc{spanId} %5p"
      otlp:
        enabled: true
        endpoint: ${OTEL_ENDPOINT:http://10.0.8.200:32043}
        timeout: 10s
      sampling-probability: 1.0